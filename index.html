<!DOCTYPE html>
<html>
<head>
  <img src="logo.jfif" width="80">
  <title>BT Bread</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f8f5f0;
      color: #333;
    }

    header {
      background-color: #3e2f23;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background-color: #2c2118;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background-color: #e8dccd;
    }

    .hero h1 {
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      background-color: #8b5e3c;
      color: white;
      padding: 12px 25px;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 15px;
    }

    .section {
      padding: 40px 20px;
      max-width: 800px;
      margin: auto;
      text-align: center;
    }

    .products {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    footer {
      background-color: #3e2f23;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    @media (min-width: 600px) {
      .products {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>BT Bread 🍞</h1>
  <p>Fresh sourdough, baked weekly</p>
</header>

<nav>
  <a href="#home">Home</a>
  <a href="#products">Products</a>
  <a href="#contact">Contact</a>
</nav>

<section class="hero" id="home">
  <h1>Handmade Sourdough</h1>
  <p>Slow fermented. Small batch. Big flavour.</p>
  <a class="btn" href="https://paypal.me/btbread" target="_blank">
</section>

<section class="section" id="products">
  <h2>Our Loaves</h2>

  <div class="products">
    <div class="card">
      <h3>Classic Sourdough</h3>
      <p>$8</p>
    </div>

    <div class="card">
      <h3>Whole Wheat</h3>
      <p>$9</p>
    </div>
  </div>
</section>

<section class="section" id="contact">
  <h2>Contact</h2>
  <p>DM or order via PayPal</p>
</section>

<footer>
  <p>© 2026 BT Bread</p>
</footer>

</body>
</html>
